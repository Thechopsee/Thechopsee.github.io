<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="styl.css"/>
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
        <link rel="shortcut icon" type="image/png" href="favicon.png"/>
        <script defer src="clanky/clanky.js"></script>
        <script defer src="js/frontInicializer.js"></script>
        <script defer src="js/galerie.js"></script>
        <script defer src="js/historie.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body onload="initFront()">
        <div id="logo_block">
        </div>
        <div id="menu_block">
        </div>
        <div>
            <h2>Historie</h2>
            <p>Portské, buček, soudek rumu. A tak to všechno začalo...</p>
        </div>
        
        <div class="cara_wraper">
            <div class="spacer" id="yearmenu">
            </div>
        </div>
        <div id="pc_galerie">
        </div>

        <!-- The Modal -->
        <div id="myModal" class="modal">
            <!-- The Close Button -->
            <span class="close">&times;</span>
            <!-- Modal Content (The Image) -->
            <img class="modal-content" id="img01">
            <!-- Modal Caption (Image Text) -->
            <div id="caption"></div>
        </div>

        <button onclick="topFunction()" id="myBtn" title="Go to top">Nahoru</button>
        <script>
            var mybutton = document.getElementById("myBtn");

            // When the user scrolls down 20px from the top of the document, show the button
            window.onscroll = function() {scrollFunction()};

            function scrollFunction() {
              if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
                mybutton.style.display = "block";
              } else {
                mybutton.style.display = "none";
              }
            }

            // When the user clicks on the button, scroll to the top of the document
            function topFunction() {
              document.body.scrollTop = 0;
              document.documentElement.scrollTop = 0;
            }
        </script>

        <div class="footer" id="footer">
        </div>
    </body>
</html>
